name: Update source from YTLiteDiarrhea releases

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

concurrency:
  group: update-source
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq unzip libplist-utils

      - name: Fetch latest upstream release
        id: release
        shell: bash
        run: |
          set -euo pipefail

          curl -fsSL https://api.github.com/repos/diarrhea3/YTLiteDiarrhea/releases/latest -o latest.json

          DRAFT=$(jq -r '.draft' latest.json)
          PRERELEASE=$(jq -r '.prerelease' latest.json)

          if [ "$DRAFT" = "true" ] || [ "$PRERELEASE" = "true" ]; then
            echo "Latest release is draft/prerelease. Exiting."
            echo "should_continue=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TAG_NAME=$(jq -r '.tag_name' latest.json)
          RELEASE_NAME=$(jq -r '.name // .tag_name' latest.json)
          PUBLISHED_AT=$(jq -r '.published_at' latest.json)
          IPA_URL=$(jq -r '.assets[] | select(.name | endswith(".ipa")) | .browser_download_url' latest.json | head -n 1)
          IPA_SIZE=$(jq -r '.assets[] | select(.name | endswith(".ipa")) | .size' latest.json | head -n 1)

          if [ -z "${IPA_URL:-}" ] || [ "$IPA_URL" = "null" ]; then
            echo "No IPA asset found in latest release"
            exit 1
          fi

          echo "should_continue=true" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"
          echo "published_at=$PUBLISHED_AT" >> "$GITHUB_OUTPUT"
          echo "ipa_url=$IPA_URL" >> "$GITHUB_OUTPUT"
          echo "ipa_size=$IPA_SIZE" >> "$GITHUB_OUTPUT"

      - name: Check whether this IPA is already published
        id: exists
        if: steps.release.outputs.should_continue == 'true'
        shell: bash
        run: |
          set -euo pipefail

          IPA_URL='${{ steps.release.outputs.ipa_url }}'

          if jq -e --arg url "$IPA_URL" '.apps[0].versions[]? | select(.downloadURL == $url)' docs/apps.json > /dev/null; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "This IPA URL is already in apps.json"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download IPA
        if: steps.release.outputs.should_continue == 'true' && steps.exists.outputs.already_published != 'true'
        shell: bash
        run: |
          set -euo pipefail
          curl -fL --retry 5 --retry-delay 5 "${{ steps.release.outputs.ipa_url }}" -o app.ipa
          test -s app.ipa

      - name: Extract version info from IPA
        id: ipa_meta
        if: steps.release.outputs.should_continue == 'true' && steps.exists.outputs.already_published != 'true'
        shell: bash
        run: |
          set -euo pipefail

          rm -rf extracted
          mkdir -p extracted
          unzip -q app.ipa -d extracted

          APP_DIR=$(find extracted/Payload -maxdepth 1 -type d -name "*.app" | head -n 1)
          if [ -z "${APP_DIR:-}" ]; then
            echo "Could not find .app inside Payload"
            exit 1
          fi

          INFO_PLIST="$APP_DIR/Info.plist"
          if [ ! -f "$INFO_PLIST" ]; then
            echo "Info.plist not found"
            exit 1
          fi

          SHORT_VERSION=$(plutil -extract CFBundleShortVersionString raw -o - "$INFO_PLIST" 2>/dev/null || true)
          BUILD_VERSION=$(plutil -extract CFBundleVersion raw -o - "$INFO_PLIST" 2>/dev/null || true)
          BUNDLE_ID=$(plutil -extract CFBundleIdentifier raw -o - "$INFO_PLIST" 2>/dev/null || true)

          if [ -z "${SHORT_VERSION:-}" ] || [ -z "${BUILD_VERSION:-}" ]; then
            echo "Could not read CFBundleShortVersionString / CFBundleVersion with plutil, trying plistutil"
            plistutil -i "$INFO_PLIST" -f json -o Info.json
            SHORT_VERSION=$(jq -r '.CFBundleShortVersionString // empty' Info.json)
            BUILD_VERSION=$(jq -r '.CFBundleVersion // empty' Info.json)
            BUNDLE_ID=$(jq -r '.CFBundleIdentifier // empty' Info.json)
          fi

          if [ -z "${SHORT_VERSION:-}" ] || [ -z "${BUILD_VERSION:-}" ]; then
            echo "Failed to extract app version metadata from IPA"
            exit 1
          fi

          echo "short_version=$SHORT_VERSION" >> "$GITHUB_OUTPUT"
          echo "build_version=$BUILD_VERSION" >> "$GITHUB_OUTPUT"
          echo "bundle_id=$BUNDLE_ID" >> "$GITHUB_OUTPUT"

      - name: Update apps.json
        if: steps.release.outputs.should_continue == 'true' && steps.exists.outputs.already_published != 'true'
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path("docs/apps.json")
          data = json.loads(path.read_text(encoding="utf-8"))

          release_name = "${{ steps.release.outputs.release_name }}"
          published_at = "${{ steps.release.outputs.published_at }}"
          ipa_url = "${{ steps.release.outputs.ipa_url }}"
          ipa_size = int("${{ steps.release.outputs.ipa_size }}")
          short_version = "${{ steps.ipa_meta.outputs.short_version }}"
          build_version = "${{ steps.ipa_meta.outputs.build_version }}"
          bundle_id = "${{ steps.ipa_meta.outputs.bundle_id }}"

          app = data["apps"][0]
          versions = app.setdefault("versions", [])

          if bundle_id:
              app["bundleIdentifier"] = bundle_id

          display_version = short_version
          if release_name and release_name != short_version:
              display_version = f"{short_version} ({release_name})"

          new_entry = {
              "version": display_version,
              "buildVersion": build_version,
              "date": published_at,
              "downloadURL": ipa_url,
              "size": ipa_size
          }

          by_url_index = next((i for i, v in enumerate(versions) if v.get("downloadURL") == ipa_url), None)
          by_build_index = next((i for i, v in enumerate(versions) if v.get("buildVersion") == build_version), None)

          if by_url_index is not None:
              versions[by_url_index] = new_entry
              print("Updated existing entry matched by downloadURL")
          elif by_build_index is not None:
              versions[by_build_index] = new_entry
              print("Updated existing entry matched by buildVersion")
          else:
              versions.insert(0, new_entry)
              print("Inserted new version entry")

          path.write_text(json.dumps(data, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")
          PY

      - name: Commit changes
        if: steps.release.outputs.should_continue == 'true' && steps.exists.outputs.already_published != 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/apps.json
          git diff --cached --quiet && { echo "No changes to commit"; exit 0; }
          git commit -m "Update source from upstream release"
          git push
